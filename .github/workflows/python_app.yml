name: "python app workflow"

on:
  push:
    branches:
      - main
    paths:
      - 'python_app/**'
      - '.github/workflows/python_app.yml'
#  schedule:
#    # 日本時間で毎週土曜日の9時に定期実行
#    - cron: '0 0 * * sat'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: python_app
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt
      - name: Run tox
        working-directory: python_app
        run: tox -e github-actions
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: python_app/htmlcov/
          retention-days: 2
